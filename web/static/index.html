<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zounds</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <header class="hero">
      <div>
        <h1>zounds</h1>
        <p class="lede">Browse indexed samples, filter by tags, inspect clusters, and preview audio from the built-in web UI.</p>
      </div>
      <div class="controls">
        <label>
          Search
          <input id="search" type="search" placeholder="impact, pad, glitch...">
        </label>
        <button id="clear-filters" type="button">Clear filters</button>
      </div>
    </header>

    <section>
      <h2>Library</h2>
      <p id="summary" class="lede"></p>
      <div id="active-filter" class="filter-chip hidden"></div>
      <div class="browser-tabs" role="tablist" aria-label="Library browsers">
        <button id="tab-search" type="button" class="browser-tab active" role="tab" aria-controls="browser-search" aria-selected="true">Search browser</button>
        <button id="tab-clusters" type="button" class="browser-tab" role="tab" aria-controls="browser-clusters" aria-selected="false">Cluster browser</button>
      </div>

      <div id="browser-search" class="browser-panel">
        <div class="layout">
          <aside>
            <h3>Tags</h3>
            <div id="tags" class="tag-cloud"></div>
          </aside>

          <div>
            <h3>Samples</h3>
            <ul id="samples" class="sample-list"></ul>
          </div>
        </div>
      </div>

      <div id="browser-clusters" class="browser-panel hidden">
        <div class="cluster-browser">
          <div class="cluster-canvas">
            <div class="cluster-toolbar">
              <label>
                Projection
                <select id="projection">
                  <option value="tsne">t-SNE</option>
                  <option value="pca">PCA</option>
                </select>
              </label>
              <button id="reset-cluster-view" type="button">Reset view</button>
            </div>
            <svg id="cluster-map" class="cluster-map" viewBox="0 0 1000 700" aria-label="Cluster visualization"></svg>
            <p class="lede">Drag to pan, scroll to zoom, and click a cluster or point to inspect the sounds inside it.</p>
          </div>

          <aside class="cluster-sidebar">
            <h3>Clusters</h3>
            <ul id="clusters" class="plain-list cluster-list"></ul>

            <div id="cluster-selection-empty" class="lede">Select a cluster to browse its sounds.</div>
            <div id="cluster-selection" class="hidden">
              <h3 id="cluster-title"></h3>
              <p id="cluster-summary" class="lede"></p>
              <ul id="cluster-samples" class="sample-list"></ul>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
